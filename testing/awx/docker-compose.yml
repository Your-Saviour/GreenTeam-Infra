# AWX 24.6.1 Testing Stack
# Prerequisites:
#   1. Copy .env.example to .env and set all passwords/secrets
#   2. Ensure the testing-proxy network exists (start testing core stack first)
#   3. Start: docker compose up -d
#
# Architecture:
#   - awx-web runs supervisord managing nginx (8052), uwsgi (8050), daphne (8051)
#   - awx-task runs supervisord managing dispatcher, receiver, receptor
#   - Settings are in config/settings.py mounted to /etc/tower/settings.py
#     (AWX production.py clears DATABASES/SECRET_KEY and loads this file)
#   - nginx.conf is overridden to fix non-root PID file permissions

services:
  postgres:
    image: postgres:16-alpine
    container_name: awx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - awx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awx-internal

  redis:
    image: redis:7-alpine
    container_name: awx-redis
    restart: unless-stopped
    volumes:
      - awx-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awx-internal

  awx-init:
    image: quay.io/ansible/awx:24.6.1
    container_name: awx-init
    restart: "no"
    command: >
      bash -c "
        awx-manage migrate --noinput &&
        awx-manage createsuperuser --username '${AWX_ADMIN_USER}' --email admin@blueteam.au --noinput 2>/dev/null;
        awx-manage update_password --username '${AWX_ADMIN_USER}' --password '${AWX_ADMIN_PASSWORD}';
        echo 'AWX init complete'
      "
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: ${PG_DATABASE}
      DATABASE_USER: ${PG_USER}
      DATABASE_PASSWORD: ${PG_PASSWORD}
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_SUPERUSER_PASSWORD: ${AWX_ADMIN_PASSWORD}
    volumes:
      - ./config/settings.py:/etc/tower/settings.py:ro
      - ./config/streaming_patch.py:/etc/tower/streaming_patch.py:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - awx-internal

  awx-web:
    image: quay.io/ansible/awx:24.6.1
    container_name: awx-web
    hostname: awxweb
    restart: unless-stopped
    command: /usr/bin/launch_awx_web.sh
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: ${PG_DATABASE}
      DATABASE_USER: ${PG_USER}
      DATABASE_PASSWORD: ${PG_PASSWORD}
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      AWX_ADMIN_USER: ${AWX_ADMIN_USER}
      AWX_ADMIN_PASSWORD: ${AWX_ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - /var/lib/awx/projects:/var/lib/awx/projects
      - ./config/settings.py:/etc/tower/settings.py:ro
      - ./config/streaming_patch.py:/etc/tower/streaming_patch.py:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      awx-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.awx-web.rule=Host(`awx.testing.blueteam.au`)"
      - "traefik.http.routers.awx-web.entrypoints=websecure"
      - "traefik.http.routers.awx-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.awx-web.loadbalancer.server.port=8052"
    networks:
      - testing-proxy
      - awx-internal

  awx-projects-init:
    image: alpine:latest
    container_name: awx-projects-init
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /awx/projects /awx/job_tmp
        cp -r /source/* /awx/projects/ 2>/dev/null || true
        chown -R 1000:0 /awx
        chmod -R 775 /awx
    volumes:
      - ./projects:/source:ro
      - /var/lib/awx/projects:/awx/projects
      - /var/lib/awx/job_tmp:/awx/job_tmp

  awx-receptor-init:
    image: quay.io/ansible/receptor:latest
    container_name: awx-receptor-init
    user: "0:0"
    restart: "no"
    entrypoint: ["sh", "-c", "cp /usr/bin/receptor /shared/receptor && chmod 755 /shared/receptor"]
    volumes:
      - awx-receptor-bin:/shared

  awx-task:
    image: quay.io/ansible/awx:24.6.1
    container_name: awx-task
    hostname: awxtask
    group_add:
      - "988"
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        # Install receptor binary from init container
        cp /shared/receptor /tmp/receptor-bin && chmod +x /tmp/receptor-bin

        # Docker CLI is bind-mounted as /usr/bin/podman (AWX hardcodes podman for jobs)

        # Create writable receptor socket dir
        mkdir -p /tmp/receptor

        # Start receptor in the background (redirect stderr to prevent
        # receptor warnings from polluting ansible-runner's worker stream)
        /tmp/receptor-bin --config /etc/receptor/receptor.conf 2>/tmp/receptor.log &
        for i in $(seq 1 30); do
          [ -S /tmp/receptor/receptor.sock ] && break
          sleep 1
        done

        # Wait for DB migrations (from awx-init)
        wait-for-migrations

        # Register this node as hybrid (control + execution) with explicit hostname.
        # Without --hostname, provision_instance enters K8s mode and creates
        # the default instance group as a container group (needs K8s pods).
        awx-manage provision_instance --hostname awxtask --node_type hybrid

        # Ensure 'default' instance group exists as a NORMAL (non-container) group
        # and assign this hybrid instance to it.
        awx-manage register_queue --queuename default --hostnames awxtask

        # Register the controlplane queue for management/project-update jobs
        awx-manage register_queue --queuename controlplane --hostnames awxtask

        # Register the default execution environment so jobs have an EE image
        awx-manage register_default_execution_environments

        # Install Ansible collections required by manual projects
        for req in /var/lib/awx/projects/*/collections/requirements.yml; do
          [ -f "$$req" ] && ansible-galaxy collection install -r "$$req" --force || true
        done

        exec supervisord -c /etc/supervisord_task.conf
    environment:
      DATABASE_HOST: postgres
      DATABASE_NAME: ${PG_DATABASE}
      DATABASE_USER: ${PG_USER}
      DATABASE_PASSWORD: ${PG_PASSWORD}
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
      SUPERVISOR_WEB_CONFIG_PATH: /etc/supervisord.conf
    volumes:
      - /var/lib/awx/projects:/var/lib/awx/projects
      - /var/lib/awx/job_tmp:/var/lib/awx/job_tmp
      - awx-receptor-bin:/shared:ro
      - ./config/settings.py:/etc/tower/settings.py:ro
      - ./config/streaming_patch.py:/etc/tower/streaming_patch.py:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/receptor.conf:/etc/receptor/receptor.conf:ro
      - ./config/ansible-runner-wrapper.sh:/tmp/ansible-runner-wrapper.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/podman:ro
    depends_on:
      awx-projects-init:
        condition: service_completed_successfully
      awx-receptor-init:
        condition: service_completed_successfully
      awx-init:
        condition: service_completed_successfully
    networks:
      - awx-internal

networks:
  awx-internal:
    internal: true
  testing-proxy:
    external: true

volumes:
  awx-postgres-data:
  awx-redis-data:
  awx-receptor-bin:
