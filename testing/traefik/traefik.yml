api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@blueteam.au
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.4.7

providers:
  docker:
    exposedByDefault: false
    network: testing-proxy
  file:
    filename: /etc/traefik/dynamic.yml
