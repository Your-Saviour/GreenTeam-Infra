server.host: "0.0.0.0"
server.name: "kibana"
server.publicBaseUrl: "https://elastic.testing.blueteam.au"

elasticsearch.hosts: ["http://es01:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_SYSTEM_PASSWORD}"

# Encryption keys (required for Fleet, alerting, and reporting)
xpack.encryptedSavedObjects.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
xpack.security.encryptionKey: "${KIBANA_SECURITY_KEY}"
xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY}"

# Fleet Server configuration
xpack.fleet.agents.fleet_server.hosts: ["https://fleet.testing.blueteam.au"]

xpack.fleet.outputs:
  - id: fleet-default-output
    name: default
    type: elasticsearch
    hosts: ["https://es.testing.blueteam.au"]
    is_default: true
    is_default_monitoring: true

# Auto-install required Fleet packages at startup
xpack.fleet.packages:
  - name: fleet_server
    version: latest
  - name: system
    version: latest
  - name: elastic_agent
    version: latest

# Pre-create Fleet Server agent policy so enrollment succeeds immediately
xpack.fleet.agentPolicies:
  - name: Fleet Server Policy
    id: fleet-server-policy
    description: Static agent policy for Fleet Server
    monitoring_enabled:
      - logs
      - metrics
    package_policies:
      - name: fleet_server-1
        package:
          name: fleet_server
      - name: system-1
        package:
          name: system
      - name: elastic_agent-1
        package:
          name: elastic_agent

telemetry.optIn: false
