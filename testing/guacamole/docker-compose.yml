# Apache Guacamole Testing Stack (Web App + guacd + PostgreSQL)
# Prerequisites:
#   1. Copy .env.example to .env and generate secrets per the instructions inside it
#   2. Ensure testing-proxy network exists (start testing core stack first)
#   3. Start: docker compose up -d
#
# Resource requirements: ~512MB RAM minimum (guacamole + guacd + postgres + initdb)
#
# Notes:
#   - Default login after first start: guacadmin / guacadmin
#   - The initdb container runs once to bootstrap the database schema, then exits
#   - guacd handles the actual RDP/VNC/SSH connections on behalf of the web app

services:

  # ─── Database Init (one-shot) ────────────────────────────────────────────────
  # Generates the Guacamole schema SQL into a shared volume. Postgres picks it
  # up automatically from /docker-entrypoint-initdb.d/ on first start.
  initdb:
    image: guacamole/guacamole:latest
    container_name: guacamole-initdb
    restart: "no"
    volumes:
      - guacamole_initdb_scripts:/initdb
    entrypoint:
      - sh
      - -c
      - "/opt/guacamole/bin/initdb.sh --postgresql > /initdb/001-schema.sql"

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: guacamole-postgres
    restart: unless-stopped
    depends_on:
      initdb:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 15s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - guacamole_postgres_data:/var/lib/postgresql/data
      - guacamole_initdb_scripts:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guacamole}
      POSTGRES_USER: ${POSTGRES_USER:-guacamole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in your .env file}
    networks:
      - guacamole-internal

  # ─── guacd (Connection Proxy Daemon) ─────────────────────────────────────────
  guacd:
    image: guacamole/guacd:latest
    container_name: guacamole-guacd
    restart: unless-stopped
    networks:
      - guacamole-internal

  # ─── Guacamole (Web Application) ────────────────────────────────────────────
  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-guacamole}
      POSTGRESQL_USER: ${POSTGRES_USER:-guacamole}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in your .env file}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.guacamole.rule=Host(`guacamole.testing.blueteam.au`)"
      - "traefik.http.routers.guacamole.entrypoints=websecure"
      - "traefik.http.routers.guacamole.tls.certresolver=letsencrypt"
      - "traefik.http.services.guacamole.loadbalancer.server.port=8080"
    networks:
      - guacamole-internal
      - testing-proxy

networks:
  guacamole-internal:
    internal: true
  testing-proxy:
    external: true

volumes:
  guacamole_postgres_data:
  guacamole_initdb_scripts:
