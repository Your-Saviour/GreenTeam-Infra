# Trivy Server Testing Stack
# Prerequisites:
#   1. Ensure testing-proxy network exists (start testing core stack first)
#   2. Start: docker compose up -d
#
# Resource requirements: ~512MB RAM minimum (trivy-server + vuln DB cache)
#
# Notes:
#   - Trivy runs in server mode, exposing its API on port 4954
#   - The vulnerability database is cached in a persistent volume
#   - Clients can scan using: trivy client --server https://trivy.testing.blueteam.au

services:

  # ─── Trivy Server ───────────────────────────────────────────────────────────
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy-server
    restart: unless-stopped
    command: server --listen 0.0.0.0:4954
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:4954/healthz || exit 1"]
      start_period: 30s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - trivy_cache:/root/.cache/trivy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trivy.rule=Host(`trivy.testing.blueteam.au`)"
      - "traefik.http.routers.trivy.entrypoints=websecure"
      - "traefik.http.routers.trivy.tls.certresolver=letsencrypt"
      - "traefik.http.services.trivy.loadbalancer.server.port=4954"
    networks:
      - testing-proxy

networks:
  testing-proxy:
    external: true

volumes:
  trivy_cache:
