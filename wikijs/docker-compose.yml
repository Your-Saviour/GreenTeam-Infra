# =============================================================================
# Wiki.js Stack (Traefik-routed)
# =============================================================================
# Wiki.js knowledge base with dedicated PostgreSQL, routed through Traefik.
#
# FIRST TIME SETUP:
#   1. Copy .env.example to .env and fill in your values
#   2. Generate secret:
#        echo "WIKIJS_PG_PASS=$(openssl rand -base64 36 | tr -d '\n')" >> .env
#   3. Ensure the proxy network exists (start core stack first)
#   4. Run: cd wikijs && docker compose up -d
#   5. Complete Wiki.js setup at: https://wiki.blueteam.au
#      - Create your admin account on first visit
#
# OIDC SETUP (after authentik + Wiki.js are running):
#   1. In authentik admin UI, create a new OAuth2/OIDC application for Wiki.js
#   2. Set redirect URI to: https://wiki.blueteam.au/login/oidc/callback
#   3. Note the Client ID, Client Secret, and issuer URL
#   4. In Wiki.js admin UI, go to Authentication > Add Strategy > OpenID Connect
#   5. Enter the Client ID, Client Secret, and set the issuer to:
#        https://auth.blueteam.au/application/o/wikijs/
#   6. Enable "Allow self-registration" if you want authentik users to auto-create
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL - Dedicated database for Wiki.js
  # ---------------------------------------------------------------------------
  wikijs-postgresql:
    image: docker.io/library/postgres:16-alpine
    container_name: wikijs-postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - wikijs_postgresql_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${WIKIJS_PG_PASS:?Please set WIKIJS_PG_PASS in your .env file}
      POSTGRES_USER: ${WIKIJS_PG_USER:-wikijs}
      POSTGRES_DB: ${WIKIJS_PG_DB:-wiki}
    networks:
      - wikijs-internal

  # ---------------------------------------------------------------------------
  # Wiki.js - Modern wiki engine with WYSIWYG and Markdown editing
  # ---------------------------------------------------------------------------
  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: wikijs
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DB_HOST: wikijs-postgresql
      DB_PORT: "5432"
      DB_USER: ${WIKIJS_PG_USER:-wikijs}
      DB_PASS: ${WIKIJS_PG_PASS}
      DB_NAME: ${WIKIJS_PG_DB:-wiki}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wikijs.rule=Host(`wiki.blueteam.au`)"
      - "traefik.http.routers.wikijs.entrypoints=websecure"
      - "traefik.http.routers.wikijs.tls.certresolver=letsencrypt"
      - "traefik.http.services.wikijs.loadbalancer.server.port=3000"
    depends_on:
      wikijs-postgresql:
        condition: service_healthy
    networks:
      - wikijs-internal
      - proxy

# =============================================================================
# Volumes
# =============================================================================
volumes:
  wikijs_postgresql_data:
    driver: local

# =============================================================================
# Networks
# wikijs-internal: Isolated network between Wiki.js and its database.
# proxy:           Shared Traefik network (defined in main docker-compose.yml).
# =============================================================================
networks:
  wikijs-internal:
    internal: true
  proxy:
    external: true
